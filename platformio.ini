; ExperienceOS Hardware Explorer v0.1
; PlatformIO + Arduino Framework for ESP32-S3-R2
; 4 MB flash + 2 MB QSPI PSRAM

[env:esp32s3]
platform = espressif32 @ ^6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; ESP32-S3-R2: 4 MB flash, 2 MB QSPI PSRAM (NOT OPI)
board_build.flash_mode = qio
board_upload.flash_size = 4MB
board_build.partitions = partitions/otaapp_4mb.csv
board_build.arduino.memory_type = qio_qspi

; LittleFS for web assets
board_build.filesystem = littlefs

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    esphome/ESPAsyncWebServer-esphome@^3.2.2
    esphome/AsyncTCP-esphome@^2.1.4
    bblanchon/ArduinoJson@^7.2.1