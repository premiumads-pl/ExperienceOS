name: Build Firmware

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'data/**'
      - 'platformio.ini'
      - 'partitions/**'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Set version
        run: |
          VERSION="${{ github.run_number }}"
          echo "#define FW_VERSION \"${VERSION}\"" > src/fw_version.h
          mkdir -p firmware
          echo "${VERSION}" > firmware/version.txt

      - name: Build firmware
        run: pio run -e esp32s3

      - name: Copy firmware binary
        run: cp .pio/build/esp32s3/firmware.bin firmware/firmware.bin

      - name: Commit and push firmware
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add firmware/firmware.bin firmware/version.txt
          git diff --staged --quiet || git commit -m "CI: firmware build ${{ github.run_number }} [skip ci]"
          git push